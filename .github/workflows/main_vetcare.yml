name: Build and deploy Node.js app to Azure Web App - VetCare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Debug tracked files
        run: |
          echo "PWD:"
          pwd
          echo ""
          echo "ROOT FILES:"
          ls -la
          echo ""
          echo "SRC:"
          ls -la src || true
          echo ""
          echo "SRC/PAGES:"
          ls -la src/pages || true
          echo ""
          echo "RegistroCliente.jsx import line:"
          grep -n "registroCliente.css\|RegistroCliente.css" src/pages/RegistroCliente.jsx || true
          echo ""
          echo "Git tracked pages files:"
          git ls-files src/pages

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B2D6804458F942D387B7E78FDB2F8DB8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_27AFE6D1DF4E4BCE877B1DDFE24A1376 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CAC27282903749A6BE7848457E90F209 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "VetCare"
          slot-name: "Production"
          package: .
